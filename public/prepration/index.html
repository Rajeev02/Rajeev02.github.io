      (function() {
        const savedTheme = localStorage.getItem("theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const currentTheme = savedTheme || systemTheme;
        document.documentElement.setAttribute("data-theme", currentTheme);
      })();

  <body>
    <div class="theme-toggle-container">
      <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme">🌗</button>
    </div>
    <div class="lock-screen">
      <div class="lock-icon">🔒</div>
      <h1>Preparation Portal</h1>
      <p class="subtitle">Enter access code to continue</p>
      <input
        id="code"
        type="password"
        inputmode="numeric"
        placeholder="Enter access code"
        autocomplete="one-time-code"
      />
      <button id="submit">Unlock</button>
      <div id="error" class="error"></div>
      <div class="info">
        <strong>Security:</strong> This uses client-side SHA-256 hashing. The
        actual code is never stored in plaintext.
      </div>
    </div>

    <script>
      const ACCESS_HASH =
        "cb7926f58653d799fa54fdf0803d1a66434fd0d3a75f61855405d539eb836abf";

      async function sha256hex(str) {
        const enc = new TextEncoder();
        const data = enc.encode(str);
        const hash = await crypto.subtle.digest("SHA-256", data);
        const h = Array.from(new Uint8Array(hash))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
        return h;
      }

      document.getElementById("submit").addEventListener("click", async () => {
        const code = document.getElementById("code").value.trim();
        if (!code) {
          showError("Enter the access code");
          return;
        }
        const h = await sha256hex(code);
        if (h === ACCESS_HASH) {
          sessionStorage.setItem("prepration_unlocked", "1");
          location.href = "/prepration/viewer.html";
        } else {
          showError("Invalid code. Try again.");
          document.getElementById("code").value = "";
        }
      });

      document
        .getElementById("code")
        .addEventListener("keypress", async (e) => {
          if (e.key === "Enter") {
            document.getElementById("submit").click();
          }
        });

      function showError(msg) {
        const el = document.getElementById("error");
        el.textContent = msg;
        el.style.display = "block";
      }

      function initThemeToggle() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        updateThemeToggleUI(currentTheme);
        
        const toggleBtn = document.getElementById("themeToggle");
        if (toggleBtn) {
          toggleBtn.addEventListener("click", () => {
            const current = document.documentElement.getAttribute("data-theme") || "light";
            let next;
            if (current === "light") {
              next = "dim";
            } else if (current === "dim") {
              next = "dark";
            } else {
              next = "light";
            }
            document.documentElement.setAttribute("data-theme", next);
            localStorage.setItem("theme", next);
            updateThemeToggleUI(next);
          });
        }
      }

      function updateThemeToggleUI(theme) {
        const toggleBtn = document.getElementById("themeToggle");
        if (!toggleBtn) return;
        if (theme === "dark") {
          toggleBtn.innerHTML = "☀️";
          toggleBtn.title = "Switch to Light Theme";
        } else if (theme === "dim") {
          toggleBtn.innerHTML = "🌙";
          toggleBtn.title = "Switch to Dark Theme";
        } else {
          toggleBtn.innerHTML = "🌗";
          toggleBtn.title = "Switch to Dim Theme";
        }
      }

      // Run theme initialization on DOM load
      window.addEventListener("DOMContentLoaded", initThemeToggle);

      // Check if already unlocked
      if (sessionStorage.getItem("prepration_unlocked") === "1") {
        location.href = "/prepration/viewer.html";
      }
    </script>
