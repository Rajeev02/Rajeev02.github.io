<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Preparation Resources</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
    <style>
      :root {
        --bg-primary: #f5f7fa;
        --bg-card: #ffffff;
        --bg-hover: #edf2f7;
        --bg-active: #667eea;
        --bg-active-hover: #5a67d8;
        --text-primary: #2d3748;
        --text-secondary: #4a5568;
        --text-muted: #718096;
        --border-color: #e2e8f0;
        --code-bg: #f7fafc;
        --code-text: #d63384;
        --pre-bg: #2d3748;
        --pre-text: #e2e8f0;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        --header-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --btn-back-bg: #e2e8f0;
        --btn-back-hover: #cbd5e0;
        --loader-bg: rgba(255, 255, 255, 0.95);
        --link-color: #4f46e5;
        --link-color-hover: #3730a3;
      }

      [data-theme="dark"] {
        --bg-primary: #0f172a;
        --bg-card: #1e293b;
        --bg-hover: #334155;
        --bg-active: #8b5cf6;
        --bg-active-hover: #7c3aed;
        --text-primary: #f8fafc;
        --text-secondary: #cbd5e1;
        --text-muted: #94a3b8;
        --border-color: #334155;
        --code-bg: #0f172a;
        --code-text: #f472b6;
        --pre-bg: #0f172a;
        --pre-text: #edf2f7;
        --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
        --header-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        --btn-back-bg: #334155;
        --btn-back-hover: #475569;
        --loader-bg: rgba(15, 23, 42, 0.95);
        --link-color: #a78bfa;
        --link-color-hover: #c084fc;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: var(--bg-primary);
        line-height: 1.6;
        color: var(--text-primary);
        transition: background-color 0.3s, color 0.3s;
      }
      .loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--loader-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: background-color 0.3s;
      }
      .loader.hidden {
        display: none;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid var(--border-color);
        border-top-color: var(--bg-active);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        transition: border-color 0.3s;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loader-text {
        margin-top: 16px;
        color: var(--text-muted);
        font-size: 14px;
        transition: color 0.3s;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      header {
        background: var(--header-gradient);
        color: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: var(--shadow);
        transition: background 0.3s, box-shadow 0.3s;
      }
      header h1 {
        font-size: 24px;
      }
      .header-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .theme-toggle-btn {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        width: 38px;
        height: 38px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s, transform 0.2s;
        backdrop-filter: blur(4px);
      }
      .theme-toggle-btn:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: scale(1.05);
      }
      .theme-toggle-btn:active {
        transform: scale(0.95);
      }
      .logout-btn {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 8px 16px;
        height: 38px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.3s, transform 0.2s;
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logout-btn:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: scale(1.02);
      }
      .logout-btn:active {
        transform: scale(0.98);
      }
      .content-wrapper {
        display: grid;
        grid-template-columns: 250px 1fr;
        gap: 20px;
      }
      .sidebar {
        background: var(--bg-card);
        padding: 20px;
        border-radius: 8px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border-color);
        height: fit-content;
        position: sticky;
        top: 20px;
        max-height: 80vh;
        overflow-y: auto;
        transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
      }
      .sidebar h3 {
        margin-bottom: 15px;
        font-size: 16px;
        color: var(--text-primary);
        transition: color 0.3s;
      }
      .section {
        margin-bottom: 20px;
      }
      .section-title {
        font-weight: 600;
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 8px;
        margin-top: 12px;
        transition: color 0.3s;
      }
      .section-title:first-child {
        margin-top: 0;
      }
      .file-link {
        display: block;
        padding: 8px 12px;
        margin-bottom: 4px;
        background: var(--bg-primary);
        border-left: 3px solid var(--bg-active);
        cursor: pointer;
        border-radius: 4px;
        font-size: 13px;
        transition: background-color 0.2s, color 0.2s, padding-left 0.2s, border-left-color 0.2s;
        text-decoration: none;
        color: var(--text-secondary);
      }
      .file-link:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
        padding-left: 16px;
      }
      .file-link.active {
        background: var(--bg-active);
        color: white !important;
        border-left-color: var(--text-primary);
      }
      .main-content {
        background: var(--bg-card);
        padding: 30px;
        border-radius: 8px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border-color);
        max-height: 80vh;
        overflow-y: auto;
        transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
      }
      .no-file {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
        transition: color 0.3s;
      }
      .no-file h2 {
        margin-bottom: 10px;
        color: var(--text-primary);
        transition: color 0.3s;
      }
      .markdown-content {
        color: var(--text-secondary);
        transition: color 0.3s;
      }
      .markdown-content a {
        color: var(--link-color);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s, text-decoration-color 0.2s;
      }
      .markdown-content a:hover {
        color: var(--link-color-hover);
        text-decoration: underline;
      }
      .markdown-content details {
        background: var(--bg-hover);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 16px 20px;
        margin: 20px 0;
        transition: background-color 0.3s, border-color 0.3s;
      }
      .markdown-content summary {
        font-weight: 600;
        cursor: pointer;
        outline: none;
        user-select: none;
        color: var(--text-primary);
        transition: color 0.2s;
      }
      .markdown-content summary:hover {
        color: var(--link-color);
      }
      .markdown-content h1,
      .markdown-content h2,
      .markdown-content h3,
      .markdown-content h4,
      .markdown-content h5,
      .markdown-content h6 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
        color: var(--text-primary);
        transition: color 0.3s;
      }
      .markdown-content h1 {
        font-size: 32px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 8px;
        transition: border-bottom-color 0.3s;
      }
      .markdown-content h2 {
        font-size: 24px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 6px;
        transition: border-bottom-color 0.3s;
      }
      .markdown-content h3 {
        font-size: 20px;
      }
      .markdown-content p {
        margin-bottom: 12px;
      }
      .markdown-content code {
        background: var(--code-bg);
        padding: 2px 6px;
        border-radius: 3px;
        font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        color: var(--code-text);
        word-break: break-word;
        white-space: pre-wrap;
        transition: background-color 0.3s, color 0.3s;
      }
      .markdown-content pre {
        background: var(--pre-bg);
        color: var(--pre-text);
        padding: 16px;
        border-radius: 6px;
        overflow-x: auto;
        margin: 16px 0;
        line-height: 1.4;
        border: 1px solid var(--border-color);
        transition: background-color 0.3s, border-color 0.3s;
      }
      .markdown-content pre code {
        background: none;
        color: inherit;
        padding: 0;
        font-size: 13px;
      }
      .markdown-content ul,
      .markdown-content ol {
        margin: 16px 0 16px 24px;
      }
      .markdown-content li {
        margin-bottom: 8px;
      }
      .markdown-content table {
        border-collapse: collapse;
        width: 100%;
        margin: 16px 0;
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .markdown-content th,
      .markdown-content td {
        border: 1px solid var(--border-color);
        padding: 12px;
        text-align: left;
        color: var(--text-secondary);
        transition: border-color 0.3s, color 0.3s;
      }
      .markdown-content th {
        background: var(--bg-hover);
        font-weight: 600;
        color: var(--text-primary);
        transition: background-color 0.3s, color 0.3s;
      }
      .markdown-content blockquote {
        border-left: 4px solid var(--bg-active);
        padding: 10px 16px;
        color: var(--text-muted);
        background: var(--bg-primary);
        margin: 16px 0;
        font-style: italic;
        border-radius: 0 6px 6px 0;
        transition: background-color 0.3s, border-left-color 0.3s;
      }
      .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        padding: 8px 16px;
        background: var(--btn-back-bg);
        color: var(--text-primary);
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        transition: background 0.2s, border-color 0.2s, color 0.2s;
        cursor: pointer;
        border: 1px solid var(--border-color);
      }
      .back-btn:hover {
        background: var(--btn-back-hover);
      }
      .code-file {
        background: var(--pre-bg);
        color: var(--pre-text);
        padding: 16px;
        border-radius: 6px;
        overflow-x: auto;
        line-height: 1.4;
        font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid var(--border-color);
        transition: background-color 0.3s, border-color 0.3s;
      }
      .info-box {
        background: var(--bg-hover);
        border-left: 4px solid var(--bg-active);
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 4px;
        font-size: 13px;
        color: var(--text-secondary);
        transition: background-color 0.3s, border-left-color 0.3s;
      }
      .file-count {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 8px;
        transition: color 0.3s;
      }
      @media (max-width: 768px) {
        .content-wrapper {
          grid-template-columns: 1fr;
        }

        /* Master-Detail Layout Toggling on Mobile */
        .content-wrapper:not(.has-active-file) .sidebar {
          display: block;
        }
        .content-wrapper:not(.has-active-file) .main-content {
          display: none;
        }
        .content-wrapper.has-active-file .sidebar {
          display: none;
        }
        .content-wrapper.has-active-file .main-content {
          display: block;
          max-height: none;
        }

        .sidebar {
          position: static;
          max-height: none;
        }
        header {
          flex-direction: column;
          gap: 15px;
          text-align: center;
        }
      }
      @media (max-width: 480px) {
        .container {
          padding: 12px;
        }
        header {
          padding: 16px;
        }
        .main-content {
          padding: 20px 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text">Loading resources...</div>
    </div>

    <div class="container">
      <header>
        <h1>📚 Preparation Resources</h1>
        <div class="header-actions">
          <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme">🌙</button>
          <button class="logout-btn" onclick="logout()">Lock & Exit</button>
        </div>
      </header>

      <div class="content-wrapper">
        <div class="sidebar">
          <h3>Contents</h3>
          <div id="fileList"></div>
          <div class="file-count" id="fileCount"></div>
        </div>
        <div class="main-content">
          <div id="content">
            <div class="no-file">
              <h2>👈 Select a resource</h2>
              <p>Choose a file from the sidebar to get started</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="embedded_data.js"></script>
    <script>
      // Initialize theme early to avoid style flashing
      (function() {
        const savedTheme = localStorage.getItem("theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const currentTheme = savedTheme || systemTheme;
        document.documentElement.setAttribute("data-theme", currentTheme);
      })();

      if (sessionStorage.getItem("prepration_unlocked") !== "1") {
        location.href = "/prepration/index.html";
      }

      const categoryNames = {
        "01-React-Native": "1. React Native",
        "02-JavaScript": "2. JavaScript",
        "03-TypeScript": "3. TypeScript",
        "04-DSA": "4. DSA",
        "05-Coding": "5. Coding",
        "06-Behavior": "6. Behavior",
      };

      let themeInitialized = false;
      let markedInitialized = false;
      function initThemeToggle() {
        if (themeInitialized) return;
        const currentTheme = document.documentElement.getAttribute("data-theme");
        updateThemeToggleUI(currentTheme);
        
        const toggleBtn = document.getElementById("themeToggle");
        if (toggleBtn) {
          toggleBtn.addEventListener("click", () => {
            const current = document.documentElement.getAttribute("data-theme");
            const next = current === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", next);
            localStorage.setItem("theme", next);
            updateThemeToggleUI(next);
          });
          themeInitialized = true;
        }
      }

      function updateThemeToggleUI(theme) {
        const toggleBtn = document.getElementById("themeToggle");
        if (!toggleBtn) return;
        if (theme === "dark") {
          toggleBtn.innerHTML = "☀️";
          toggleBtn.title = "Switch to Light Mode";
        } else {
          toggleBtn.innerHTML = "🌙";
          toggleBtn.title = "Switch to Dark Mode";
        }
      }

      function hideLoader() {
        const loader = document.getElementById("loader");
        if (loader) loader.classList.add("hidden");
      }

      function showLoader() {
        const loader = document.getElementById("loader");
        if (loader) loader.classList.remove("hidden");
      }

      function initializeApp() {
        try {
          // Initialize theme toggle
          initThemeToggle();

          // Wait for marked to be available
          if (typeof marked === "undefined") {
            console.error("marked library not loaded yet");
            setTimeout(initializeApp, 100);
            return;
          }

          if (!markedInitialized) {
            if (typeof markedGfmHeadingId !== "undefined" && typeof marked.use === "function") {
              marked.use(markedGfmHeadingId.gfmHeadingId());
            }
            markedInitialized = true;
          }

          if (typeof embeddedFileData === "undefined" || !embeddedFileData) {
            console.error("embedded_data.js failed to load");
            document.getElementById("content").innerHTML =
              '<div class="info-box">❌ Error: Resources failed to load. Please refresh the page.</div>';
            hideLoader();
            return;
          }

          renderFileList();
          countFiles();
          hideLoader();
        } catch (err) {
          console.error("Error initializing:", err);
          document.getElementById("content").innerHTML =
            '<div class="info-box">❌ Error: ' + err.message + "</div>";
          hideLoader();
        }
      }

      function countFiles() {
        let total = 0;
        for (const [section, files] of Object.entries(embeddedFileData)) {
          total += files.length;
        }
        document.getElementById("fileCount").textContent =
          `Total: ${total} files`;
      }

      function renderFileList() {
        const fileList = document.getElementById("fileList");
        fileList.innerHTML = "";

        for (const [section, files] of Object.entries(embeddedFileData)) {
          const sectionDiv = document.createElement("div");
          sectionDiv.className = "section";

          const sectionTitle = document.createElement("div");
          sectionTitle.className = "section-title";
          sectionTitle.textContent = `${categoryNames[section] || section} (${files.length})`;
          sectionDiv.appendChild(sectionTitle);

          const sortedFiles = [...files].sort((a, b) =>
            a.name.localeCompare(b.name),
          );

          for (const file of sortedFiles) {
            const link = document.createElement("a");
            link.className = "file-link";
            link.textContent = formatFileName(file.name);
            link.dataset.filename = file.name;
            link.dataset.section = section;
            link.onclick = (e) => {
              e.preventDefault();
              loadFile(file, section);
            };
            sectionDiv.appendChild(link);
          }

          fileList.appendChild(sectionDiv);
        }
      }

      function formatFileName(name) {
        const withoutExt = name.replace(/\.(md|js)$/, "");
        return withoutExt
          .replace(/[-_]/g, " ")
          .replace(/\d+-/, "")
          .replace(/\b\w/g, (l) => l.toUpperCase());
      }

      function loadFile(file, section) {
        showLoader();
        setTimeout(() => {
          displayContent(file.content, file.name, file.type);
          updateActiveLink(section, file.name);
          const wrapper = document.querySelector(".content-wrapper");
          if (wrapper) wrapper.classList.add("has-active-file");
          hideLoader();
        }, 300);
      }

      async function displayContent(content, filename, type) {
        const contentDiv = document.getElementById("content");
        const backBtn =
          '<button class="back-btn" onclick="goBack()">← Back to Contents</button>';

        if (!content || content.trim().length === 0) {
          contentDiv.innerHTML =
            backBtn +
            '<div class="info-box">⚠️ This file is empty or incomplete.</div>';
          return;
        }

        if (type === "md") {
          try {
            // Use marked with both callback and promise support
            let htmlContent;
            if (typeof marked.parse === "function") {
              htmlContent = await marked.parse(content);
            } else if (typeof marked === "function") {
              htmlContent = marked(content);
            } else {
              throw new Error("marked library not properly loaded");
            }
            contentDiv.innerHTML =
              backBtn + `<div class="markdown-content">${htmlContent}</div>`;
          } catch (err) {
            console.error("Markdown render error:", err);
            contentDiv.innerHTML =
              backBtn +
              `<div class="info-box">Error rendering markdown: ${err.message}</div>`;
          }
        } else {
          const escapedCode = escapeHtml(content);
          contentDiv.innerHTML =
            backBtn +
            `<pre class="code-file"><code>${escapedCode}</code></pre>`;
        }
      }

      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.replace(/[&<>"']/g, (m) => map[m]);
      }

      function updateActiveLink(section, filename) {
        document.querySelectorAll(".file-link").forEach((link) => {
          if (link.dataset.section === section && link.dataset.filename === filename) {
            link.classList.add("active");
          } else {
            link.classList.remove("active");
          }
        });
      }

      function goBack() {
        document.getElementById("content").innerHTML = `<div class="no-file">
        <h2>👈 Select a resource</h2>
        <p>Choose a file from the sidebar to get started</p>
      </div>`;
        document
          .querySelectorAll(".file-link")
          .forEach((link) => link.classList.remove("active"));
        const wrapper = document.querySelector(".content-wrapper");
        if (wrapper) wrapper.classList.remove("has-active-file");
      }

      function logout() {
        sessionStorage.removeItem("prepration_unlocked");
        location.href = "/prepration/index.html";
      }

      window.addEventListener("load", initializeApp);
    </script>
  </body>
</html>
