<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Preparation Resources</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fa;
      line-height: 1.6;
      color: #2d3748;
    }
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loader.hidden {
      display: none;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loader-text {
      margin-top: 16px;
      color: #718096;
      font-size: 14px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 24px;
    }
    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid white;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    .content-wrapper {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 20px;
    }
    .sidebar {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      height: fit-content;
      position: sticky;
      top: 20px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .sidebar h3 {
      margin-bottom: 15px;
      font-size: 16px;
      color: #1a202c;
    }
    .section {
      margin-bottom: 20px;
    }
    .section-title {
      font-weight: 600;
      font-size: 12px;
      color: #718096;
      text-transform: uppercase;
      margin-bottom: 8px;
      margin-top: 12px;
    }
    .section-title:first-child {
      margin-top: 0;
    }
    .file-link {
      display: block;
      padding: 8px 12px;
      margin-bottom: 4px;
      background: #f7fafc;
      border-left: 3px solid #667eea;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: all 0.2s;
      text-decoration: none;
      color: #2d3748;
    }
    .file-link:hover {
      background: #edf2f7;
      padding-left: 16px;
    }
    .file-link.active {
      background: #667eea;
      color: white;
      border-left-color: #764ba2;
    }
    .main-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      max-height: 80vh;
      overflow-y: auto;
    }
    .no-file {
      text-align: center;
      padding: 60px 20px;
      color: #718096;
    }
    .no-file h2 {
      margin-bottom: 10px;
      color: #4a5568;
    }
    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3,
    .markdown-content h4,
    .markdown-content h5,
    .markdown-content h6 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .markdown-content h1 {
      font-size: 32px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }
    .markdown-content h2 {
      font-size: 24px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 6px;
    }
    .markdown-content h3 {
      font-size: 20px;
    }
    .markdown-content p {
      margin-bottom: 12px;
    }
    .markdown-content code {
      background: #f7fafc;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #d63384;
    }
    .markdown-content pre {
      background: #2d3748;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 16px 0;
      line-height: 1.4;
    }
    .markdown-content pre code {
      background: none;
      color: inherit;
      padding: 0;
      font-size: 13px;
    }
    .markdown-content ul,
    .markdown-content ol {
      margin: 16px 0 16px 24px;
    }
    .markdown-content li {
      margin-bottom: 8px;
    }
    .markdown-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
    }
    .markdown-content th,
    .markdown-content td {
      border: 1px solid #e2e8f0;
      padding: 12px;
      text-align: left;
    }
    .markdown-content th {
      background: #f7fafc;
      font-weight: 600;
    }
    .markdown-content blockquote {
      border-left: 4px solid #667eea;
      padding-left: 16px;
      color: #718096;
      margin: 16px 0;
      font-style: italic;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 16px;
      background: #e2e8f0;
      color: #2d3748;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      transition: background 0.2s;
      cursor: pointer;
      border: none;
    }
    .back-btn:hover {
      background: #cbd5e0;
    }
    .code-file {
      background: #2d3748;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      line-height: 1.4;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .info-box {
      background: #edf2f7;
      border-left: 4px solid #667eea;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-size: 13px;
      color: #4a5568;
    }
    .file-count {
      font-size: 12px;
      color: #718096;
      margin-top: 8px;
    }
    @media (max-width: 768px) {
      .content-wrapper {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        max-height: none;
      }
      .main-content {
        max-height: none;
      }
      header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Loading resources...</div>
  </div>

  <div class="container">
    <header>
      <h1>📚 Preparation Resources</h1>
      <button class="logout-btn" onclick="logout()">Lock & Exit</button>
    </header>

    <div class="content-wrapper">
      <div class="sidebar">
        <h3>Contents</h3>
        <div id="fileList"></div>
        <div class="file-count" id="fileCount"></div>
      </div>
      <div class="main-content">
        <div id="content">
          <div class="no-file">
            <h2>👈 Select a resource</h2>
            <p>Choose a file from the sidebar to get started</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="embedded_data.js"></script>
  <script>
    if (sessionStorage.getItem('prepration_unlocked') !== '1') {
      location.href = '/prepration/index.html';
    }

    const categoryNames = {
      'coding': 'Coding',
      'theory': 'Theory',
      'others': 'Others'
    };

    function hideLoader() {
      const loader = document.getElementById('loader');
      if (loader) loader.classList.add('hidden');
    }

    function showLoader() {
      const loader = document.getElementById('loader');
      if (loader) loader.classList.remove('hidden');
    }

    function initializeApp() {
      try {
        if (typeof embeddedFileData === 'undefined' || !embeddedFileData) {
          console.error('embedded_data.js failed to load');
          document.getElementById('content').innerHTML = '<div class="info-box">❌ Error: Resources failed to load. Please refresh the page.</div>';
          hideLoader();
          return;
        }

        renderFileList();
        countFiles();
        hideLoader();
      } catch (err) {
        console.error('Error initializing:', err);
        document.getElementById('content').innerHTML = '<div class="info-box">❌ Error: ' + err.message + '</div>';
        hideLoader();
      }
    }

    function countFiles() {
      let total = 0;
      for (const [section, files] of Object.entries(embeddedFileData)) {
        total += files.length;
      }
      document.getElementById('fileCount').textContent = `Total: ${total} files`;
    }

    function renderFileList() {
      const fileList = document.getElementById('fileList');
      fileList.innerHTML = '';

      for (const [section, files] of Object.entries(embeddedFileData)) {
        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'section';

        const sectionTitle = document.createElement('div');
        sectionTitle.className = 'section-title';
        sectionTitle.textContent = `${categoryNames[section] || section} (${files.length})`;
        sectionDiv.appendChild(sectionTitle);

        const sortedFiles = [...files].sort((a, b) => a.name.localeCompare(b.name));

        for (const file of sortedFiles) {
          const link = document.createElement('a');
          link.className = 'file-link';
          link.textContent = formatFileName(file.name);
          link.dataset.filename = file.name;
          link.dataset.section = section;
          link.onclick = (e) => {
            e.preventDefault();
            loadFile(file);
          };
          sectionDiv.appendChild(link);
        }

        fileList.appendChild(sectionDiv);
      }
    }

    function formatFileName(name) {
      const withoutExt = name.replace(/\.(md|js)$/, '');
      return withoutExt
        .replace(/[-_]/g, ' ')
        .replace(/\d+-/, '')
        .replace(/\b\w/g, l => l.toUpperCase());
    }

    function loadFile(file) {
      showLoader();
      setTimeout(() => {
        displayContent(file.content, file.name, file.type);
        updateActiveLink(file.name);
        hideLoader();
      }, 300);
    }

    async function displayContent(content, filename, type) {
      const contentDiv = document.getElementById('content');
      const backBtn = '<button class="back-btn" onclick="goBack()">← Back to Contents</button>';

      if (!content || content.trim().length === 0) {
        contentDiv.innerHTML = backBtn + '<div class="info-box">⚠️ This file is empty or incomplete.</div>';
        return;
      }

      if (type === 'md') {
        try {
          const htmlContent = await marked.parse(content);
          contentDiv.innerHTML = backBtn + `<div class="markdown-content">${htmlContent}</div>`;
        } catch (err) {
          contentDiv.innerHTML = backBtn + `<div class="info-box">Error rendering: ${err.message}</div>`;
        }
      } else {
        const escapedCode = escapeHtml(content);
        contentDiv.innerHTML = backBtn + `<pre class="code-file"><code>${escapedCode}</code></pre>`;
      }
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, (m) => map[m]);
    }

    function updateActiveLink(filename) {
      document.querySelectorAll('.file-link').forEach((link) => {
        if (link.dataset.filename === filename) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    }

    function goBack() {
      document.getElementById('content').innerHTML = `<div class="no-file">
        <h2>👈 Select a resource</h2>
        <p>Choose a file from the sidebar to get started</p>
      </div>`;
      document.querySelectorAll('.file-link').forEach((link) => link.classList.remove('active'));
    }

    function logout() {
      sessionStorage.removeItem('prepration_unlocked');
      location.href = '/prepration/index.html';
    }

    window.addEventListener('load', initializeApp);
  </script>
</body>
</html>
