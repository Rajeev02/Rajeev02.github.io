<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Preparation Resources</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: #f5f7fa;
        line-height: 1.6;
        color: #2d3748;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 {
        font-size: 24px;
      }
      .logout-btn {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid white;
        color: white;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.3s;
      }
      .logout-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      .content-wrapper {
        display: grid;
        grid-template-columns: 250px 1fr;
        gap: 20px;
      }
      .sidebar {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        height: fit-content;
        position: sticky;
        top: 20px;
      }
      .sidebar h3 {
        margin-bottom: 15px;
        font-size: 16px;
        color: #1a202c;
      }
      .section {
        margin-bottom: 20px;
      }
      .section-title {
        font-weight: 600;
        font-size: 12px;
        color: #718096;
        text-transform: uppercase;
        margin-bottom: 8px;
        margin-top: 12px;
      }
      .section-title:first-child {
        margin-top: 0;
      }
      .file-link {
        display: block;
        padding: 8px 12px;
        margin-bottom: 4px;
        background: #f7fafc;
        border-left: 3px solid #667eea;
        cursor: pointer;
        border-radius: 4px;
        font-size: 13px;
        transition: all 0.2s;
        text-decoration: none;
        color: #2d3748;
      }
      .file-link:hover {
        background: #edf2f7;
        padding-left: 16px;
      }
      .file-link.active {
        background: #667eea;
        color: white;
        border-left-color: #764ba2;
      }
      .main-content {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .no-file {
        text-align: center;
        padding: 60px 20px;
        color: #718096;
      }
      .no-file h2 {
        margin-bottom: 10px;
        color: #4a5568;
      }
      .markdown-content h1,
      .markdown-content h2,
      .markdown-content h3,
      .markdown-content h4,
      .markdown-content h5,
      .markdown-content h6 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
      }
      .markdown-content h1 {
        font-size: 32px;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 8px;
      }
      .markdown-content h2 {
        font-size: 24px;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 6px;
      }
      .markdown-content h3 {
        font-size: 20px;
      }
      .markdown-content p {
        margin-bottom: 12px;
      }
      .markdown-content code {
        background: #f7fafc;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: "Courier New", monospace;
        font-size: 14px;
        color: #d63384;
      }
      .markdown-content pre {
        background: #2d3748;
        color: #e2e8f0;
        padding: 16px;
        border-radius: 6px;
        overflow-x: auto;
        margin: 16px 0;
        line-height: 1.4;
      }
      .markdown-content pre code {
        background: none;
        color: inherit;
        padding: 0;
        font-size: 13px;
      }
      .markdown-content ul,
      .markdown-content ol {
        margin: 16px 0 16px 24px;
      }
      .markdown-content li {
        margin-bottom: 8px;
      }
      .markdown-content table {
        border-collapse: collapse;
        width: 100%;
        margin: 16px 0;
      }
      .markdown-content th,
      .markdown-content td {
        border: 1px solid #e2e8f0;
        padding: 12px;
        text-align: left;
      }
      .markdown-content th {
        background: #f7fafc;
        font-weight: 600;
      }
      .markdown-content blockquote {
        border-left: 4px solid #667eea;
        padding-left: 16px;
        color: #718096;
        margin: 16px 0;
        font-style: italic;
      }
      .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        padding: 8px 16px;
        background: #e2e8f0;
        color: #2d3748;
        text-decoration: none;
        border-radius: 4px;
        font-size: 14px;
        transition: background 0.2s;
      }
      .back-btn:hover {
        background: #cbd5e0;
      }
      @media (max-width: 768px) {
        .content-wrapper {
          grid-template-columns: 1fr;
        }
        .sidebar {
          position: static;
        }
        header {
          flex-direction: column;
          gap: 15px;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📚 Preparation Resources</h1>
        <button class="logout-btn" onclick="logout()">Lock & Exit</button>
      </header>

      <div class="content-wrapper">
        <div class="sidebar">
          <h3>Contents</h3>
          <div id="fileList"></div>
        </div>
        <div class="main-content">
          <div id="content">
            <div class="no-file">
              <h2>👈 Select a resource</h2>
              <p>Choose a file from the sidebar to get started</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Security check
      if (sessionStorage.getItem("prepration_unlocked") !== "1") {
        location.href = "/prepration/index.html";
      }

      const fileStructure = {
        Coding: [
          { name: "Class Component", file: "P001-classcomponent.js" },
          { name: "Functional Component", file: "P002-FunctionalComponent.js" },
          { name: "FlatList Sample", file: "P003-Flatlist-sample.js" },
          { name: "Capco Interview", file: "P004-Capco.md" },
          {
            name: "Math Questions",
            file: "P005-MathematicalMostAskQuestion.md",
          },
          { name: "Interview Guide P006", file: "P006.md" },
          {
            name: "Important Practice Questions",
            file: "P007-IMP-Practice_Questions.md",
          },
          { name: "Interview P008", file: "P008.md" },
          { name: "ChatGPT Interview", file: "P010-chatgpt.md" },
          { name: "Extra DSA", file: "P011-ExtraDSA.md" },
          { name: "Kashee Notes", file: "P012-Kashee.md" },
        ],
        Theory: [
          { name: "Components", file: "000-Components.md" },
          { name: "Native Library", file: "001-native_library.md" },
          {
            name: "How to Use Native Library",
            file: "002-how_to_use_native_library.md",
          },
          {
            name: "Native Equivalent Performance",
            file: "003-NativeEquivalentPerformance.md",
          },
          {
            name: "Class vs Functional Components",
            file: "004-diffrencebetweenclassand functionalcomponent.md",
          },
          { name: "useEffect Hook", file: "005-useEffect.md" },
          { name: "React Hooks", file: "006-Hooks.md" },
          { name: "Async Handling", file: "007-AsynHandle.md" },
          { name: "Garbage Collector", file: "008-GarbageCollector.md" },
          {
            name: "Handling Massive Lists",
            file: "009-Handling a massive list of data with .md",
          },
          {
            name: "useEffect without Dependency",
            file: "010-useEffectwithoutdependcy.md",
          },
          { name: "Redux", file: "011-redux.md" },
          {
            name: "React Query & TanStack Query",
            file: "012-ReactQuery_TanStackQuery.md",
          },
          {
            name: "Redux Toolkit & React Query",
            file: "013-redux-toolkit-react-query.md",
          },
          {
            name: "GC & Memory Leaks",
            file: "014-GC-GarbageCollector-MemoryLeak.md",
          },
          { name: "React Native Web", file: "015-ReactNativeWeb.md" },
          {
            name: "Web, Mobile, Tablet, Desktop",
            file: "016-web-mobile-tablet-desktop.md",
          },
          { name: "Babel", file: "017-Babel.md" },
          { name: "Yoga", file: "018-Yoga.md" },
          { name: "Metro", file: "019-metro.md" },
          { name: "Optimize App Size", file: "020-optimise-app-size.md" },
          {
            name: "Old vs New Architecture",
            file: "021-oldVsNewArchitecture.md",
          },
          {
            name: "Complete React Native Journey",
            file: "022-CompleteReactNativeAppJourney.md",
          },
          {
            name: "Justify Content & Align Items",
            file: "023-justfycontent-alignitems.md",
          },
          {
            name: "Legacy Code Compatibility",
            file: "024-legacycodecompatibility.md",
          },
          { name: "Architecture", file: "025-Architecture.md" },
          { name: "New Framework", file: "026-NewFramework.md" },
          {
            name: "Upcoming Questions Guide",
            file: "027-upcoming-questions-guide.md",
          },
          {
            name: "Custom Hook - useNetwork",
            file: "028-customHoom-useNetwrok.md",
          },
          { name: "Interview Q&A", file: "029-InterviewQA.md" },
          { name: "Important Q&A", file: "030-someinportantqa.md" },
          { name: "Class Component", file: "031-classcompont.md" },
          { name: "Yarn vs NPM", file: "032-YarnNPM.md" },
          {
            name: "Deep Linking & Referral Tracking",
            file: "033-differed-deep-linking-Referral-Tracking.md",
          },
          { name: "Testing Types", file: "034-TestingTypes.md" },
          { name: "Git Commands", file: "035-git-commands.md" },
          { name: "Push Notifications", file: "036-pushnotificaition.md" },
          {
            name: "New Architecture Lifecycle",
            file: "037-NewArchitectureLifeCycle.md",
          },
        ],
        Others: [
          {
            name: "LaundryMate Interview",
            file: "Interview-001-LaundryMate.md",
          },
          {
            name: "React Native Async & Navigation",
            file: "react_native_async_and_navigation_interview_notes_md.md",
          },
        ],
      };

      function renderFileList() {
        const fileList = document.getElementById("fileList");
        fileList.innerHTML = "";

        for (const [section, files] of Object.entries(fileStructure)) {
          const sectionDiv = document.createElement("div");
          sectionDiv.className = "section";

          const sectionTitle = document.createElement("div");
          sectionTitle.className = "section-title";
          sectionTitle.textContent = section;
          sectionDiv.appendChild(sectionTitle);

          for (const file of files) {
            const link = document.createElement("a");
            link.className = "file-link";
            link.textContent = file.name;
            link.onclick = (e) => {
              e.preventDefault();
              loadFile(file.file, section);
            };
            sectionDiv.appendChild(link);
          }

          fileList.appendChild(sectionDiv);
        }
      }

      async function loadFile(filename, section) {
        const sectionMap = {
          Coding: "coding",
          Theory: "theory",
          Others: "others",
        };
        const path = `/src/prepration/${sectionMap[section]}/${filename}`;

        try {
          const response = await fetch(path);
          if (!response.ok) throw new Error("File not found");
          const content = await response.text();
          displayContent(content, filename);
          updateActiveLink(filename);
        } catch (error) {
          document.getElementById("content").innerHTML =
            `<div class="no-file"><h2>Error</h2><p>Could not load file: ${filename}</p></div>`;
        }
      }

      function displayContent(content, filename) {
        const contentDiv = document.getElementById("content");
        if (filename.endsWith(".md")) {
          contentDiv.innerHTML = `<a href="#" class="back-btn" onclick="goBack(event)">← Back to Contents</a><div class="markdown-content">${marked.parse(content)}</div>`;
        } else {
          contentDiv.innerHTML = `<a href="#" class="back-btn" onclick="goBack(event)">← Back to Contents</a><pre><code>${escapeHtml(content)}</code></pre>`;
        }
      }

      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.replace(/[&<>"']/g, (m) => map[m]);
      }

      function updateActiveLink(filename) {
        document.querySelectorAll(".file-link").forEach((link) => {
          link.classList.remove("active");
        });
        const allLinks = document.querySelectorAll(".file-link");
        allLinks.forEach((link) => {
          if (link.textContent && link.onclick.toString().includes(filename)) {
            link.classList.add("active");
          }
        });
      }

      function goBack(e) {
        e.preventDefault();
        document.getElementById("content").innerHTML = `<div class="no-file">
        <h2>👈 Select a resource</h2>
        <p>Choose a file from the sidebar to get started</p>
      </div>`;
        document
          .querySelectorAll(".file-link")
          .forEach((link) => link.classList.remove("active"));
      }

      function logout() {
        sessionStorage.removeItem("prepration_unlocked");
        location.href = "/prepration/index.html";
      }

      renderFileList();
    </script>
  </body>
</html>
